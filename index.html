<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RepoID — GitHub Interview Prep for CS Students</title>
    <meta name="description" content="Scan your GitHub repo and get custom interview questions. 640+ questions across Frontend, Backend, AI/ML, Data Science, Cybersecurity and more. Built for CS students.">
    <meta name="keywords" content="interview prep, CS interview questions, GitHub interview, FAANG prep, frontend interview questions, backend interview questions, coding interview">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://repoid.space/">
    <link rel="icon" type="image/svg+xml" href="/assets/repoid-logo-black.svg">

    <!-- Open Graph -->
    <meta property="og:title" content="RepoID — GitHub Interview Prep for CS Students">
    <meta property="og:description" content="Scan your GitHub repo and get personalized interview questions. 640+ questions across 6 domains.">
    <meta property="og:url" content="https://repoid.space/">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://repoid.space/og-image.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="RepoID — GitHub Interview Prep for CS Students">
    <meta name="twitter:description" content="Scan your GitHub repo and get personalized interview questions. 640+ questions across 6 domains.">
    <meta name="twitter:image" content="https://repoid.space/og-image.png">

    <!-- JSON-LD structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "RepoID",
      "url": "https://repoid.space",
      "description": "Interview prep platform for CS students. Scan your GitHub repo for personalized questions. 640+ questions across Frontend, Backend, AI/ML, Data Science, Data Analytics, and Cybersecurity.",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free",
          "price": "0",
          "priceCurrency": "INR"
        },
        {
          "@type": "Offer",
          "name": "Monthly",
          "price": "99",
          "priceCurrency": "INR"
        }
      ]
    }
    </script>

    <script>
      (() => {
        const themeStorageKey = 'promptly_theme_preference';
        const savedTheme = localStorage.getItem(themeStorageKey);
        const theme = savedTheme === 'dark' || savedTheme === 'light' || savedTheme === 'system' ? savedTheme : 'light';
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const useDarkTheme = theme === 'dark' || (theme === 'system' && prefersDark);
        document.documentElement.classList.toggle('dark', useDarkTheme);
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = useDarkTheme ? 'dark' : 'light';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
